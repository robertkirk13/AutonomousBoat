<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoatCore SIL Visualizer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0e17;
        color: #e0e6f0;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 13px;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        width: 280px;
        background: #131a2b;
        border-right: 1px solid #1e2d4a;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        flex-shrink: 0;
      }
      #sidebar h1 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      #sidebar h2 {
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #6b7a94;
        margin-bottom: 6px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .field label {
        font-size: 11px;
        color: #6b7a94;
      }
      .field input {
        background: #0a0e17;
        border: 1px solid #1e2d4a;
        border-radius: 4px;
        color: #e0e6f0;
        padding: 6px 8px;
        font-family: inherit;
        font-size: 13px;
      }
      .field input:focus {
        outline: none;
        border-color: #3b82f6;
      }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 8px 12px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
      }
      button:hover { background: #2563eb; }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #6b7a94;
      }
      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
      }
      .status.connected { color: #e0e6f0; }
      .status.connected::before { background: #22c55e; }
      #sim-panel {
        flex: 1;
        position: relative;
      }
      #canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .controls-help {
        font-size: 11px;
        color: #6b7a94;
        line-height: 1.6;
      }
      .controls-help kbd {
        background: #1e2d4a;
        border-radius: 3px;
        padding: 1px 5px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>BoatCore SIL Visualizer</h1>

      <div>
        <h2>MQTT Connection</h2>
        <div class="field">
          <label>Host</label>
          <input id="mqtt-host" type="text" placeholder="xxxxx.hivemq.cloud" />
        </div>
        <div class="field">
          <label>WS Port</label>
          <input id="mqtt-port" type="text" value="8884" />
        </div>
        <div class="field">
          <label>Username</label>
          <input id="mqtt-user" type="text" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="mqtt-pass" type="password" />
        </div>
        <button id="connect-btn">Connect</button>
        <div id="mqtt-status" class="status">Disconnected</div>
      </div>

      <div>
        <h2>Info</h2>
        <div class="controls-help">
          Subscribes to firmware MQTT topics and<br/>
          visualizes sensor data in real-time.<br/><br/>
          Run firmware with <kbd>--features sim</kbd><br/>
          for SIL testing without hardware.
        </div>
      </div>
    </div>

    <div id="sim-panel">
      <canvas id="canvas"></canvas>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
